<html>
    <head>
        <link rel="stylesheet" href="index.css">
    </head>
    <body>
        <div class="container">
            <div>
                <h3 id="home">HOME</h3>
                    <div class="score">
                        <p id="home-score">0</p>
                    </div>               
                <button class="btn" id="home-btn-1" onclick="homeScoreIncreaseOne()">+1</button>
                <button class="btn" id="home-btn-2" onclick="homeScoreIncreaseTwo()">+2</button>
                <button class="btn" id="home-btn-3" onclick="homeScoreIncreaseThree()">+3</button>
            </div>
            <div>
                <button id="reset-btn" onclick="resetBothScore()">Reset</button>
            </div>
            <div>
                <h3 id="guest">GUEST</h3>
                    <div class="score">
                        <p id="guest-score">0</p>
                    </div>
                <button class="btn" id="guest-btn-1" onclick="guestScoreIncreaseOne()">+1</button>
                <button class="btn" id="guest-btn-2" onclick="guestScoreIncreaseTwo()">+2</button>
                <button class="btn" id="guest-btn-3" onclick="guestScoreIncreaseThree()">+3</button>                
            </div>

        </div>
        <script src="index.js"></script>
    </body>
</html>
